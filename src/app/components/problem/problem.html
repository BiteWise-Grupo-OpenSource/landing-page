<section class="s-prob">
  <div class="section-eyebrow">El problema</div>
  <h2 class="prob-title">Las apps de nutrición actuales te generan fricción, <span>no resultados.</span></h2>
  <div class="prob-grid">
    <div class="prob-col bad">
      <div class="prob-col-title">Sin BiteWise</div>
      <div class="prob-item" *ngFor="let item of badItems">
        <div class="prob-icon">✗</div>
        <div class="prob-text"><strong>{{ item.title }}</strong>{{ item.desc }}</div>
      </div>
    </div>
    <div class="prob-col good">
      <div class="prob-col-title">Con BiteWise</div>
      <div class="prob-item" *ngFor="let item of goodItems">
        <div class="prob-icon">✓</div>
        <div class="prob-text"><strong>{{ item.title }}</strong>{{ item.desc }}</div>
      </div>
    </div>
  </div>
</section>
